<app-auth-layout>
  <div class="wrapper">
    <div class="card">
      <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
      <img src="assets/cubiertos.png" class="logo" />

      <span class="title">DEMS!</span>

      <span class="subtitle">
        Dinner Environment Management <br />System
      </span>

      <!-- Alerta -->
      <div *ngIf="alerta" class="alerta-overlay">
        <div class="alerta-box" [ngClass]="'alerta-' + alerta.tipo">
          <span class="material-icons alerta-icono">
            {{ alerta.tipo === 'error' ? 'error_outline' : 'check_circle_outline' }}
          </span>
          <span class="alerta-texto">{{ alerta.mensaje }}</span>
          <button *ngIf="alerta.tipo === 'error'" class="alerta-btn" (click)="cerrarAlerta()">
            Aceptar
          </button>
        </div>
      </div>

      <app-input #inputUsuario label="Usuario" type="text"
        (enterPressed)="onLogin()">
      </app-input>

      <app-input #inputContraseña label="Contraseña" [isPasswordToggle]="true"
        (enterPressed)="onLogin()">
      </app-input>

      <app-button
        [text]="isLoading ? 'Ingresando...' : 'Ingresar'"
        (click)="onLogin()">
      </app-button>

    </div>
  </div>
</app-auth-layout>
